name: Build ZipCracker

on:
  push:
    tags:
      - '*'          # 匹配任何新 tag
  workflow_dispatch: # 允许手动触发

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false   # 一个平台失败不影响其他平台
      matrix:
        include:
          - name: 'ZipCracker'
            platform: 'linux/amd64'
            os: 'ubuntu-latest'
            output_name: 'zipcracker-linux-amd64'
          - name: 'ZipCracker'
            platform: 'windows/amd64'
            os: 'windows-latest'
            output_name: 'zipcracker-windows-amd64.exe'
          - name: 'ZipCracker'
            platform: 'darwin/universal'
            os: 'macos-latest'
            output_name: 'zipcracker-darwin-universal'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # ---------- 新增：Linux 系统依赖 ----------
      - name: 安装 Linux 构建依赖 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            gcc

      # ---------- 新增：Windows 可能需要的工具 ----------
      - name: 安装 Windows 构建依赖 (仅 Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # 通常 Windows 不需要额外安装，但确保有 mingw 等，可通过 msys2 安装
          # 如果你使用 gcc，可能需要安装，但 Wails 使用 go 自带的编译器
          # 这里留空，如果后续有问题再补充
          echo "Windows dependencies already satisfied"

      # ---------- 安装 Wails CLI ----------
      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        run: |
          cd frontend
          npm install

      # ---------- 构建 ----------
      - name: 构建 Wails 应用
        run: wails build -platform ${{ matrix.platform }}

      # ---------- 上传产物（仅当构建成功） ----------
      - name: 上传 Linux 产物
        if: matrix.os == 'ubuntu-latest' && success()
        uses: actions/upload-artifact@v4
        with:
          name: zipcracker-linux-amd64
          path: build/bin/zipcracker-linux-amd64*

      - name: 上传 Windows 产物
        if: matrix.os == 'windows-latest' && success()
        uses: actions/upload-artifact@v4
        with:
          name: zipcracker-windows-amd64
          path: build/bin/zipcracker-windows-amd64*

      - name: 上传 macOS 产物
        if: matrix.os == 'macos-latest' && success()
        uses: actions/upload-artifact@v4
        with:
          name: zipcracker-darwin-universal
          path: build/bin/zipcracker-darwin-universal*
