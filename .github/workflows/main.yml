name: Build ZipCracker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        # 如果您只需要 Linux，可以只保留 ubuntu-latest
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Linux 需要安装系统依赖 ----------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential

      # ---------- macOS 需要 Xcode ----------
      # macOS runner 自带 Xcode，无需额外操作

      # ---------- Windows 需要安装 WebView2 运行时 ----------
      # Windows runner 通常已预装 WebView2，若没有可以添加安装步骤（通常不需要）

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'    # 与 go.mod 一致，您写的是 1.24.4
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'      # 或 20，按您实际要求
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build with Wails
        # 自动检测平台，也可以显式指定 -platform
        run: wails build -clean -trimpath

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zipcracker-${{ matrix.os }}
          # Wails 默认输出到 build/bin/，但也有可能输出到当前目录，具体看 wails.json 配置
          # 这里同时捕获常见的输出位置
          path: |
            build/bin/
            zipcracker*
            *.exe
            *.dmg
