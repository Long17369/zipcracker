name: Build ZipCracker

on:
  # 当推送新 tag 时触发（适合发布版本）
  push:
    tags:
      - '*'  # 匹配任何新 tag
  # 手动触发（方便测试）
  workflow_dispatch:

env:
  # 防止构建时内存不足
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      # 一个平台构建失败不影响其他平台
      fail-fast: false
      matrix:
        include:
          - name: 'ZipCracker'
            platform: 'linux/amd64'
            os: 'ubuntu-latest'
            output_name: 'zipcracker-linux-amd64'
          - name: 'ZipCracker'
            platform: 'windows/amd64'
            os: 'windows-latest'
            output_name: 'zipcracker-windows-amd64.exe'
          - name: 'ZipCracker'
            platform: 'darwin/universal'
            os: 'macos-latest'
            output_name: 'zipcracker-darwin-universal'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          # 自动缓存 Go 模块
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 自动缓存 npm 依赖
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        run: |
          cd frontend
          npm install

      - name: 构建 Wails 应用
        run: wails build -platform ${{ matrix.platform }}

      - name: 上传构建产物 (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: zipcracker-linux-amd64
          path: build/bin/zipcracker-linux-amd64*

      - name: 上传构建产物 (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: zipcracker-windows-amd64
          path: build/bin/zipcracker-windows-amd64*

      - name: 上传构建产物 (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: zipcracker-darwin-universal
          path: build/bin/zipcracker-darwin-universal*
